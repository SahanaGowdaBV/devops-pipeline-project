replicaCount: 2

image:
  repository: YOUR_DOCKERHUB_USERNAME/devops-app
  tag: "latest"

service:
  type: NodePort
  port: 80

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50
